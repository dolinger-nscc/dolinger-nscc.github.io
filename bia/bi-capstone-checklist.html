<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI Capstone Project Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-light: #eeece6;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-faint: #a09e99;
    --accent: #1D9E75;
    --accent-light: #e1f5ee;
    --accent-dark: #085041;
    --tag-bg: #f0ede6;
    --tag-text: #4a4840;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .header-left p {
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    min-width: 200px;
  }

  .progress-nums {
    font-family: 'DM Mono', monospace;
    font-size: 0.875rem;
    color: var(--text-muted);
  }

  .progress-nums span {
    font-weight: 500;
    color: var(--text);
  }

  .progress-track {
    width: 200px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.35s ease;
    width: 0%;
  }

  .reset-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 0;
  }

  .reset-btn:hover { color: var(--text-muted); }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .section {
    margin-bottom: 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }

  .section-header:hover { background: var(--bg); }
  .section.open .section-header { border-bottom-color: var(--border-light); }

  .section-icon {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
  }

  .section-meta { flex: 1; min-width: 0; }
  .section-title { font-size: 0.9375rem; font-weight: 500; }
  .section-sub { font-size: 0.75rem; color: var(--text-faint); margin-top: 1px; font-family: 'DM Mono', monospace; }

  .section-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 3px 9px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .section-badge.complete {
    background: var(--accent-light);
    color: var(--accent-dark);
  }

  .chevron {
    font-size: 12px;
    color: var(--text-faint);
    transition: transform 0.2s;
  }

  .section.open .chevron { transform: rotate(180deg); }

  .items-wrap { display: none; }
  .section.open .items-wrap { display: block; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 18px;
    cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: var(--bg); }
  .item.checked { background: #fafaf8; }

  .cb {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
  }

  .item.checked .cb {
    background: var(--accent);
    border-color: var(--accent);
  }

  .cb svg { display: none; }
  .item.checked .cb svg { display: block; }

  .item-body { flex: 1; min-width: 0; }

  .item-text {
    font-size: 0.875rem;
    line-height: 1.55;
    color: var(--text);
    transition: color 0.15s;
  }

  .item.checked .item-text {
    color: var(--text-faint);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }

  .item-note {
    font-size: 0.75rem;
    color: var(--text-faint);
    margin-top: 3px;
    line-height: 1.45;
  }

  .item.checked .item-note { color: var(--border); }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--text-faint);
    border-top: 1px solid var(--border-light);
  }

  @media (max-width: 540px) {
    header { padding: 1.25rem 1rem; }
    .header-right { min-width: 0; width: 100%; align-items: flex-start; }
    .progress-track { width: 100%; }
    main { padding: 1.25rem 0.75rem 3rem; }
    .section-header { padding: 12px 14px; }
    .item { padding: 10px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>BI Capstone — Project Checklist</h1>
    <p>Check off each item as your team completes it. Progress saves automatically in your browser.</p>
  </div>
  <div class="header-right">
    <div class="progress-nums"><span id="done-count">0</span> of <span id="total-count">0</span> complete</div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <button class="reset-btn" onclick="resetAll()">reset all</button>
  </div>
</header>

<main id="checklist-root"></main>

<footer>Progress is stored locally in your browser &mdash; each device tracks independently.</footer>

<script>
const SECTIONS = [
  {
    id: "docs",
    color: "#E1F5EE", iconColor: "#085041",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    title: "Documentation",
    sub: "/docs — GitHub repo",
    items: [
      { text: "Problem statement written and agreed upon by the team", note: "Business question, scope, success criteria, and why it matters" },
      { text: "Data dictionary complete for every table", note: "Field name, data type, description, source, valid values, null handling" },
      { text: "Schema diagram (ERD or star/snowflake) created and exported", note: "Visual + written relationship descriptions" },
      { text: "Data quality report documenting issues found and how they were resolved" },
      { text: "Assumptions log recording every major decision made and the rationale" },
      { text: "Model card written covering algorithm, metrics, limitations, and ethical considerations" },
      { text: "Executive summary (1-pager) written in business language — no technical jargon" },
      { text: "README.md complete with project overview, team members, and how to run the code" },
      { text: "CHANGELOG.md or equivalent tracking major milestones and version decisions" }
    ]
  },
  {
    id: "data",
    color: "#E6F1FB", iconColor: "#0C447C",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
    title: "Data pipeline",
    sub: "/data — GitHub repo",
    items: [
      { text: "Raw source data ingested and stored in /data/raw (or linked if files are too large)" },
      { text: "Cleaned and transformed data saved in /data/processed" },
      { text: "ETL / transformation steps documented or scripted", note: "Not just done manually in Excel — steps should be reproducible" },
      { text: "All nulls, duplicates, and outliers addressed with documented decisions" },
      { text: "Data grain confirmed — you can describe what one row represents in every table" }
    ]
  },
  {
    id: "analysis",
    color: "#EEEDFE", iconColor: "#3C3489",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>`,
    title: "Analysis & modelling",
    sub: "/notebooks — GitHub repo",
    items: [
      { text: "EDA notebook complete with distributions, correlations, and business context noted" },
      { text: "Feature engineering notebook complete with decisions documented", note: "Not just what you did — explain why you did it" },
      { text: "Model selected and the choice justified over alternatives", note: "What did you try first? Why did you choose this one?" },
      { text: "Model training notebook complete and reproducible end-to-end" },
      { text: "Model evaluation complete with appropriate metrics", note: "e.g. RMSE, R², AUC, confusion matrix — matched to your problem type" },
      { text: "Model predictions exported in a format usable by Power BI" },
      { text: "Code is clean, commented, and another person could run it without guidance" },
      { text: "requirements.txt or environment file committed to the repo" }
    ]
  },
  {
    id: "powerbi",
    color: "#FAEEDA", iconColor: "#633806",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
    title: "Power BI report",
    sub: "/powerbi — GitHub repo",
    items: [
      { text: "Data model built as a star or snowflake schema — no flat tables", note: "Fact table(s) and dimension tables with proper relationships" },
      { text: "All relationships checked — correct cardinality and cross-filter directions" },
      { text: "Custom DAX measures written (not just default sum/count aggregations)" },
      { text: "All DAX measures documented in dax-measures.md with business context" },
      { text: "At least 3 distinct report pages (e.g. overview, detail, predictive / model output)" },
      { text: "KPIs clearly labeled with business definitions visible to the viewer" },
      { text: "Slicers and cross-filtering configured and tested" },
      { text: "Drill-through or drill-down enabled on at least one visual" },
      { text: "Predictive model output is visible and interpreted in the report" },
      { text: "Consistent visual design — colour scheme, fonts, and layout are cohesive" },
      { text: "Report reviewed on a screen other than the one it was built on" },
      { text: "Dashboard screenshots saved to /powerbi/dashboard-screenshots/ for repo preview" }
    ]
  },
  {
    id: "presentation",
    color: "#FAECE7", iconColor: "#712B13",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="M12 16v5"/><path d="M8 21h8"/></svg>`,
    title: "Panel presentation",
    sub: "15–20 min demo + 10 min Q&A",
    items: [
      { text: "Clear story arc: problem → data → insight → recommendation (in that order)" },
      { text: "All 4 team members have a defined presenting role" },
      { text: "Live Power BI demo rehearsed — not slides describing the dashboard" },
      { text: "Findings translated into business language throughout", note: "A manager who doesn't know ML should be able to follow the whole story" },
      { text: "Recommendations are specific and actionable — not 'the business should consider...'" },
      { text: "Limitations and risks of your analysis are disclosed honestly" },
      { text: "Next steps / future analysis roadmap included" },
      { text: "Full dry run timed — presentation stays within 20 minutes" },
      { text: "Slide deck or visual aid exported to PDF and committed to /presentation/" }
    ]
  },
  {
    id: "qa",
    color: "#F1EFE8", iconColor: "#444441",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    title: "Panel Q&A preparation",
    sub: "Practice fielding these as a team",
    items: [
      { text: "Every team member can explain the data dictionary and schema in plain language" },
      { text: "Every team member can walk through one DAX measure end-to-end" },
      { text: "Team has practiced: 'Why this algorithm over alternatives?'" },
      { text: "Team has practiced: 'What does your accuracy mean in business terms?'" },
      { text: "Team has practiced: 'What is the cost of a false positive vs. false negative?'" },
      { text: "Team has practiced: 'If this went to production, how would data be refreshed?'" },
      { text: "Team has practiced: 'What would you do next with more time and data?'" },
      { text: "Team has agreed on how to handle questions no one can answer", note: "It's fine to say 'we'd need to investigate that further' — practice saying it confidently" }
    ]
  },
  {
    id: "repo",
    color: "#EAF3DE", iconColor: "#27500A",
    icon: `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`,
    title: "GitHub repo — final checks",
    sub: "Before submission",
    items: [
      { text: "Repo is organized with the agreed folder structure", note: "/docs, /data, /notebooks, /powerbi, /presentation, /models" },
      { text: "All notebooks run top-to-bottom without errors in a clean environment" },
      { text: "No sensitive data committed to the repo", note: "Check for API keys, passwords, or personal information" },
      { text: "Large files handled appropriately — .gitignore set, or Git LFS used for .pbix files" },
      { text: "Final repo link tested — accessible to anyone with the URL" },
      { text: "A tagged release or commit identifies the version submitted for assessment" }
    ]
  }
];

const STORAGE_KEY = 'bi-capstone-checklist-v1';
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
  SECTIONS.forEach(s => s.items.forEach((_, i) => {
    const k = s.id + '-' + i;
    if (!(k in state)) state[k] = false;
  }));
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function allKeys() {
  return SECTIONS.flatMap(s => s.items.map((_, i) => s.id + '-' + i));
}

function updateProgress() {
  const keys = allKeys();
  const done = keys.filter(k => state[k]).length;
  const total = keys.length;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct.toFixed(1) + '%';
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
}

function updateSectionBadge(sid) {
  const keys = SECTIONS.find(s => s.id === sid).items.map((_, i) => sid + '-' + i);
  const done = keys.filter(k => state[k]).length;
  const el = document.getElementById('badge-' + sid);
  el.textContent = done + ' / ' + keys.length;
  el.className = 'section-badge' + (done === keys.length ? ' complete' : '');
}

function toggleItem(sid, idx) {
  const k = sid + '-' + idx;
  state[k] = !state[k];
  saveState();
  const itemEl = document.getElementById('item-' + k);
  itemEl.classList.toggle('checked', state[k]);
  updateSectionBadge(sid);
  updateProgress();
}

function toggleSection(sid) {
  const sec = document.getElementById('sec-' + sid);
  sec.classList.toggle('open');
}

function resetAll() {
  if (!confirm('Reset all checkboxes? This cannot be undone.')) return;
  allKeys().forEach(k => state[k] = false);
  saveState();
  document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
  SECTIONS.forEach(s => updateSectionBadge(s.id));
  updateProgress();
}

function checkSVG() {
  return `<svg width="11" height="9" viewBox="0 0 11 9" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4.5 4 7.5 10 1.5"/></svg>`;
}

function render() {
  const root = document.getElementById('checklist-root');
  root.innerHTML = '';
  SECTIONS.forEach(s => {
    const sec = document.createElement('div');
    sec.className = 'section open';
    sec.id = 'sec-' + s.id;

    const doneNow = s.items.filter((_, i) => state[s.id + '-' + i]).length;
    const isComplete = doneNow === s.items.length;

    const itemsHTML = s.items.map((item, i) => {
      const k = s.id + '-' + i;
      const checked = state[k];
      return `<div class="item${checked ? ' checked' : ''}" id="item-${k}" onclick="toggleItem('${s.id}', ${i})" role="checkbox" aria-checked="${checked}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){toggleItem('${s.id}',${i});event.preventDefault()}">
        <div class="cb">${checkSVG()}</div>
        <div class="item-body">
          <div class="item-text">${item.text}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection('${s.id}')" aria-expanded="true">
        <div class="section-icon" style="background:${s.color};color:${s.iconColor}">${s.icon}</div>
        <div class="section-meta">
          <div class="section-title">${s.title}</div>
          <div class="section-sub">${s.sub}</div>
        </div>
        <div class="section-badge${isComplete ? ' complete' : ''}" id="badge-${s.id}">${doneNow} / ${s.items.length}</div>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="items-wrap">${itemsHTML}</div>`;

    root.appendChild(sec);
  });
}

loadState();
render();
updateProgress();
</script>
</body>
</html>
